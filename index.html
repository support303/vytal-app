          <div style={{ textAlign: 'center', marginTop: 20, fontSize: 11, color: sageColors.inkFaint, lineHeight: 1.5 }}>
            By continuing you agree to our<br />
            <span style={{ textDecoration: 'underline', color: sageColors.inkSoft }}>Terms</span> &amp; <span style={{ textDecoration: 'underline', color: sageColors.inkSoft }}>Privacy Policy</span>
          </div>
        </div>
      </div>
    </div>);

}

function SageLogin({ onBack, onAuthed, onSignup }) {
  const [email, setEmail] = React.useState('maya@vytal.app');
  const [pw, setPw] = React.useState('••••••••');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const submit = (e) => {
    e?.preventDefault?.();
    if (!email.trim() || !pw.trim()) {setError('Fill in both fields.');return;}
    setError(null);
    setLoading(true);
    setTimeout(() => {setLoading(false);onAuthed();}, 800);
  };

  return (
    <div style={{ height: '100%', background: sageColors.bg, padding: '56px 24px 36px', display: 'flex', flexDirection: 'column' }}>
      <button onClick={onBack} style={{
        width: 36, height: 36, borderRadius: 18, background: sageColors.surface, border: 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', marginBottom: 28
      }}>{SageIcon.back(sageColors.ink)}</button>

      <div style={{ fontFamily: '"Fraunces", serif', fontSize: 34, letterSpacing: -1, color: sageColors.ink, marginBottom: 6, fontWeight: 400 }}>Welcome back.</div>
      <div style={{ fontSize: 14, color: sageColors.inkSoft, marginBottom: 28 }}>Glad to see you again.</div>

      <form onSubmit={submit}>
        <SageField label="Email" value={email} onChange={setEmail} type="email" />
        <SageField label="Password" value={pw} onChange={setPw} type="password" />

        <div style={{ textAlign: 'right', marginTop: -4, marginBottom: 20 }}>
          <button type="button" style={{ background: 'none', border: 'none', fontSize: 13, color: sageColors.sage, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>
            Forgot password?
          </button>
        </div>

        {error && <div style={{ background: sageColors.dangerSoft, color: sageColors.danger, padding: '10px 14px', borderRadius: 12, fontSize: 13, marginBottom: 12 }}>{error}</div>}

        <SageButton onClick={submit} disabled={loading}>
          {loading ? 'Signing in…' : 'Sign in'}
        </SageButton>
      </form>

      <SageDivider label="or" />

      <SageOAuth label="Continue with Apple" icon="apple" onClick={() => {setLoading(true);setTimeout(onAuthed, 600);}} />
      <SageOAuth label="Continue with Google" icon="google" onClick={() => {setLoading(true);setTimeout(onAuthed, 600);}} />

      <div style={{ flex: 1 }} />
      <div style={{ textAlign: 'center', fontSize: 13, color: sageColors.inkSoft, marginTop: 24 }}>
        New here? <button onClick={onSignup} style={{ background: 'none', border: 'none', color: sageColors.sage, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit', fontSize: 13 }}>Create account</button>
      </div>
    </div>);

}

function SageSignup({ onBack, onAuthed, onLogin }) {
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const submit = () => {setLoading(true);setTimeout(onAuthed, 800);};

  return (
    <div style={{ height: '100%', background: sageColors.bg, padding: '56px 24px 36px', display: 'flex', flexDirection: 'column' }}>
      <button onClick={onBack} style={{
        width: 36, height: 36, borderRadius: 18, background: sageColors.surface, border: 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', marginBottom: 28
      }}>{SageIcon.back(sageColors.ink)}</button>

      <div style={{ fontFamily: '"Fraunces", serif', fontSize: 34, letterSpacing: -1, color: sageColors.ink, marginBottom: 6, fontWeight: 400 }}>Let's begin.</div>
      <div style={{ fontSize: 14, color: sageColors.inkSoft, marginBottom: 28 }}>Set up your VYTAL companion.</div>

      <SageField label="Email" value={email} onChange={setEmail} type="email" placeholder="you@email.com" />
      <SageField label="Password" value={pw} onChange={setPw} type="password" placeholder="At least 8 characters" />

      <div style={{ marginTop: 12 }}>
        <SageButton onClick={submit} disabled={loading || !email.trim() || pw.length < 1}>
          {loading ? 'Creating…' : 'Continue'}
        </SageButton>
      </div>

      <SageDivider label="or" />
      <SageOAuth label="Continue with Apple" icon="apple" onClick={onAuthed} />
      <SageOAuth label="Continue with Google" icon="google" onClick={onAuthed} />

      <div style={{ flex: 1 }} />
      <div style={{ textAlign: 'center', fontSize: 13, color: sageColors.inkSoft, marginTop: 24 }}>
        Have an account? <button onClick={onLogin} style={{ background: 'none', border: 'none', color: sageColors.sage, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit', fontSize: 13 }}>Sign in</button>
      </div>
    </div>);

}

function SageField({ label, value, onChange, type = 'text', placeholder }) {
  const [focused, setFocused] = React.useState(false);
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 12, color: sageColors.inkSoft, letterSpacing: 0.3, textTransform: 'uppercase', marginBottom: 8, paddingLeft: 4, fontWeight: 500 }}>{label}</div>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)}
      onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
      placeholder={placeholder}
      style={{
        width: '100%', boxSizing: 'border-box',
        background: sageColors.surface, border: focused ? `2px solid ${sageColors.sage}` : '2px solid transparent',
        borderRadius: 16, padding: '14px 16px', fontSize: 15, color: sageColors.ink,
        fontFamily: 'inherit', outline: 'none',
        transition: 'border-color 0.15s'
      }} />
    </div>);

}

function SageDivider({ label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '22px 0' }}>
      <div style={{ flex: 1, height: 1, background: sageColors.divider }} />
      <div style={{ fontSize: 12, color: sageColors.inkFaint }}>{label}</div>
      <div style={{ flex: 1, height: 1, background: sageColors.divider }} />
    </div>);

}

function SageOAuth({ label, icon, onClick }) {
  return (
    <button onClick={onClick} style={{
      width: '100%', background: sageColors.surface, border: `1px solid ${sageColors.divider}`, borderRadius: 20,
      padding: '15px 16px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
      marginBottom: 10, cursor: 'pointer', fontFamily: 'inherit', fontSize: 14, fontWeight: 500, color: sageColors.ink
    }}>
      {icon === 'apple' && <svg width="18" height="18" viewBox="0 0 18 18" fill={sageColors.ink}><path d="M13.5 9.6c0-1.9 1.5-2.8 1.6-2.9-.9-1.3-2.2-1.5-2.7-1.5-1.1-.1-2.2.7-2.8.7-.6 0-1.5-.7-2.5-.6-1.3 0-2.5.7-3.1 1.9-1.3 2.3-.3 5.7 1 7.6.6.9 1.4 2 2.4 2 1 0 1.3-.6 2.5-.6s1.5.6 2.5.6c1 0 1.7-.9 2.3-1.9.7-1 1-2.1 1-2.1s-2.1-.8-2.2-3.2zM11.7 4c.5-.6.9-1.4.8-2.3-.8 0-1.7.5-2.2 1.1-.5.5-.9 1.4-.8 2.2.9.1 1.7-.4 2.2-1z" /></svg>}
      {icon === 'google' && <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17 9.2c0-.6-.1-1.1-.2-1.7H9v3.2h4.5c-.2 1-.8 1.9-1.7 2.5v2.1h2.7c1.6-1.5 2.5-3.6 2.5-6.1z" fill="#4285F4" /><path d="M9 17.5c2.3 0 4.2-.8 5.5-2.1l-2.7-2.1c-.8.5-1.7.8-2.8.8-2.2 0-4-1.5-4.7-3.5H1.6v2.2C2.9 15.6 5.7 17.5 9 17.5z" fill="#34A853" /><path d="M4.3 10.6c-.2-.5-.3-1-.3-1.6s.1-1.1.3-1.6V5.2H1.6C.9 6.4.5 7.9.5 9s.4 2.6 1.1 3.8l2.7-2.2z" fill="#FBBC04" /><path d="M9 3.9c1.2 0 2.3.4 3.2 1.2l2.4-2.4C13.2 1.3 11.3.5 9 .5 5.7.5 2.9 2.4 1.6 5.2l2.7 2.2C5 5.4 6.8 3.9 9 3.9z" fill="#EA4335" /></svg>}
      {label}
    </button>);

}

Object.assign(window, { SageAuth });
</script>
<script type="text/babel" data-file="components/sage/diary.jsx">
// Diary tab — Yazio-inspired food log with meals, macros, water

function SageDiary({ state, onOpen }) {
  const { user, kcalToday, kcalRemaining, proteinToday, carbsToday, fatToday, water, foodsByMeal } = state;
  const kcalPct = Math.min(100, (kcalToday / user.dailyCalorieGoal) * 100);
  const proteinPct = Math.min(100, (proteinToday / user.proteinGoal) * 100);
  const carbsPct = Math.min(100, (carbsToday / user.carbsGoal) * 100);
  const fatPct = Math.min(100, (fatToday / user.fatGoal) * 100);

  const [dateOffset, setDateOffset] = React.useState(0);
  const dateLabel = dateOffset === 0 ? 'Today' : dateOffset === -1 ? 'Yesterday' : `${Math.abs(dateOffset)} days ago`;

  return (
    <div style={{ padding: '56px 20px 24px' }}>
      {/* Date nav */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <button onClick={() => setDateOffset(d => d - 1)} style={{
          width: 36, height: 36, borderRadius: 18, background: sageColors.surface, border: 'none',
          display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>{SageIcon.back(sageColors.ink)}</button>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 2 }}>Thursday · Apr 23</div>
          <div style={{ fontSize: 22, fontWeight: 500, letterSpacing: -0.5 }}>{dateLabel}</div>
        </div>
        <button onClick={() => dateOffset < 0 && setDateOffset(d => d + 1)} style={{
          width: 36, height: 36, borderRadius: 18, background: dateOffset < 0 ? sageColors.surface : 'transparent', border: 'none',
          display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: dateOffset < 0 ? 'pointer' : 'default',
          opacity: dateOffset < 0 ? 1 : 0.3,
        }}>{SageIcon.arrow(sageColors.ink)}</button>
      </div>

      {/* Calorie hero card */}
      <div style={{
        background: sageColors.surface, borderRadius: 28, padding: '22px 20px',
        marginBottom: 12,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
          <TripleRing
            kcalPct={kcalPct} proteinPct={proteinPct} carbsPct={carbsPct} fatPct={fatPct}
            size={140}
          >
            <div style={{ fontSize: 28, fontWeight: 500, letterSpacing: -0.8, color: sageColors.ink }}>{kcalRemaining}</div>
            <div style={{ fontSize: 10, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase' }}>kcal left</div>
          </TripleRing>
          <div style={{ flex: 1, fontSize: 12 }}>
            <KcalRow label="Goal" value={user.dailyCalorieGoal} color={sageColors.inkSoft} />
            <KcalRow label="Food" value={kcalToday} color={sageColors.sageDeep} />
            <KcalRow label="Left" value={kcalRemaining} color={sageColors.accent} bold />
          </div>
        </div>

        {/* Macros bars */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginTop: 18, paddingTop: 16, borderTop: `1px solid ${sageColors.divider}` }}>
          <MacroBar label="Protein" val={proteinToday} goal={user.proteinGoal} color={sageColors.protein} />
          <MacroBar label="Carbs" val={carbsToday} goal={user.carbsGoal} color={sageColors.carbs} />
          <MacroBar label="Fat" val={fatToday} goal={user.fatGoal} color={sageColors.fat} />
        </div>
      </div>

      {/* Water tracker */}
      <SageCard style={{ marginBottom: 12, padding: '16px 18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 12 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 12, background: sageColors.waterSoft,
            display: 'flex', alignItems: 'center', justifyContent: 'center', marginRight: 12,
          }}>{SageIcon.water(sageColors.water, 18)}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 500 }}>Water</div>
            <div style={{ fontSize: 12, color: sageColors.inkSoft }}>{water} of {user.waterGoal} glasses</div>
          </div>
          <button onClick={state.removeWater} style={{
            width: 32, height: 32, borderRadius: 16, background: sageColors.bg, border: 'none',
            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            fontSize: 18, color: sageColors.ink, fontFamily: 'inherit',
          }}>−</button>
          <button onClick={state.addWater} style={{
            width: 32, height: 32, borderRadius: 16, background: sageColors.water, border: 'none',
            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', marginLeft: 6,
            fontSize: 18, color: '#fff', fontFamily: 'inherit',
          }}>+</button>
        </div>
        <div style={{ display: 'flex', gap: 5 }}>
          {[...Array(user.waterGoal)].map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 28, borderRadius: 6,
              background: i < water ? sageColors.water : sageColors.waterSoft,
              transition: 'background 0.3s',
            }} />
          ))}
        </div>
      </SageCard>

      {/* Meals */}
      {['Breakfast', 'Lunch', 'Dinner', 'Snack'].map(meal => (
        <MealSection key={meal} meal={meal} foods={foodsByMeal(meal)} onAdd={() => onOpen({ type: 'search', meal })} onRemove={state.removeFood} />
      ))}

      {/* Quick add row */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 16 }}>
        <QuickAction label="Scan barcode" icon={SageIcon.barcode(sageColors.sageDeep)} onClick={() => onOpen({ type: 'barcode' })} />
        <QuickAction label="Photo meal" icon={SageIcon.camera(sageColors.sageDeep)} onClick={() => onOpen({ type: 'photo' })} />
      </div>
    </div>
  );
}

function KcalRow({ label, value, color, bold }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0' }}>
      <span style={{ color: sageColors.inkSoft }}>{label}</span>
      <span style={{ color, fontWeight: bold ? 600 : 500, fontVariantNumeric: 'tabular-nums' }}>{value}</span>
    </div>
  );
}

function MacroBar({ label, val, goal, color }) {
  const pct = Math.min(100, (val / goal) * 100);
  return (
    <div>
      <div style={{ fontSize: 11, color: sageColors.inkSoft, marginBottom: 6, letterSpacing: 0.3 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 6, letterSpacing: -0.2 }}>
        <span>{Math.round(val)}</span>
        <span style={{ color: sageColors.inkFaint, fontSize: 11, fontWeight: 400 }}> / {goal}g</span>
      </div>
      <div style={{ height: 4, background: sageColors.divider, borderRadius: 999, overflow: 'hidden' }}>
        <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: 999, transition: 'width 0.5s' }} />
      </div>
    </div>
  );
}

function MealSection({ meal, foods, onAdd, onRemove }) {
  const mealIcons = {
    Breakfast: '🌅', Lunch: '🥗', Dinner: '🍽', Snack: '🍎',
  };
  const mealTime = {
    Breakfast: '6am – 10am', Lunch: '12pm – 2pm', Dinner: '6pm – 9pm', Snack: 'Anytime',
  };
  const total = foods.reduce((s, f) => s + f.kcal, 0);

  return (
    <div style={{ marginTop: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', margin: '4px 4px 8px' }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: sageColors.ink }}>{meal}</div>
          <div style={{ fontSize: 11, color: sageColors.inkFaint, marginTop: 1 }}>{mealTime[meal]}</div>
        </div>
        <div style={{ fontSize: 13, color: sageColors.inkSoft, fontWeight: 500, fontVariantNumeric: 'tabular-nums' }}>{total} <span style={{ fontSize: 11, color: sageColors.inkFaint, fontWeight: 400 }}>kcal</span></div>
      </div>

      <div style={{ background: sageColors.surface, borderRadius: 20, overflow: 'hidden' }}>
        {foods.map((f, i) => (
          <FoodRow key={f.id} food={f} onRemove={() => onRemove(f.id)} isLast={i === foods.length - 1 && foods.length > 0} />
        ))}
        <button onClick={onAdd} style={{
          width: '100%', padding: '14px 16px', background: 'transparent', border: 'none',
          display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', fontFamily: 'inherit',
          borderTop: foods.length > 0 ? `1px solid ${sageColors.divider}` : 'none',
        }}>
          <div style={{
            width: 36, height: 36, borderRadius: 12, background: sageColors.sageLight,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>{SageIcon.plus(sageColors.sageDeep, 14)}</div>
          <div style={{ fontSize: 14, color: sageColors.sageDeep, fontWeight: 500 }}>Add {meal.toLowerCase()}</div>
        </button>
      </div>
    </div>
  );
}

function FoodRow({ food, onRemove, isLast }) {
  const [swiped, setSwiped] = React.useState(false);
  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderBottom: !isLast ? `1px solid ${sageColors.divider}` : 'none' }}>
      <div style={{
        padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12,
        transition: 'transform 0.2s', transform: swiped ? 'translateX(-68px)' : 'translateX(0)',
      }} onClick={() => setSwiped(s => !s)}>
        {food.hasPhoto
          ? <FoodPhotoPlaceholder w={44} h={44} radius={12} label="photo" />
          : <div style={{
              width: 44, height: 44, borderRadius: 12, background: sageColors.sageLight,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M11 2v18M4 6c0 4 3 7 7 7M18 6c0 4-3 7-7 7" stroke={sageColors.sageDeep} strokeWidth="1.5" strokeLinecap="round"/></svg>
            </div>}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{food.name}</div>
          <div style={{ fontSize: 11, color: sageColors.inkSoft, marginTop: 2, display: 'flex', gap: 6 }}>
            <span>{food.serving || food.time}</span>
            <span style={{ color: sageColors.inkFaint }}>·</span>
            <span>P {food.protein || 0}g</span>
            <span style={{ color: sageColors.inkFaint }}>·</span>
            <span>C {food.carbs || 0}g</span>
            <span style={{ color: sageColors.inkFaint }}>·</span>
            <span>F {food.fat || 0}g</span>
          </div>
        </div>
        <div style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>
          <div style={{ fontSize: 16, fontWeight: 500, letterSpacing: -0.3 }}>{food.kcal}</div>
          <div style={{ fontSize: 10, color: sageColors.inkFaint }}>kcal</div>
        </div>
      </div>
      <button onClick={(e) => { e.stopPropagation(); onRemove(); }} style={{
        position: 'absolute', top: 0, right: 0, bottom: 0, width: 60,
        background: sageColors.danger, color: '#fff', border: 'none', cursor: 'pointer',
        fontSize: 12, fontWeight: 500, fontFamily: 'inherit',
        transform: swiped ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.2s',
      }}>Remove</button>
    </div>
  );
}

function QuickAction({ label, icon, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: sageColors.surface, border: 'none', borderRadius: 18,
      padding: '16px 14px', display: 'flex', alignItems: 'center', gap: 10,
      cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 10, background: sageColors.sageLight,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>{icon}</div>
      <div style={{ fontSize: 13, fontWeight: 500, color: sageColors.ink }}>{label}</div>
    </button>
  );
}

Object.assign(window, { SageDiary });

</script>
<script type="text/babel" data-file="components/sage/progress.jsx">
// Progress tab — weight chart, stats, measurements, achievements

function SageProgress({ state, onOpen }) {
  const { weight, history, lostKg, toGoalKg, progressPct, user, bmi, achievements } = state;
  const weekChange = history.length >= 2 ? (history[history.length - 1].weight - history[history.length - 2].weight) : 0;
  const bmiLabel = bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Healthy' : bmi < 30 ? 'Overweight' : 'High';
  const weeksToGoal = toGoalKg > 0 && lostKg > 0 ? Math.ceil(toGoalKg / (lostKg / user.weekNumber)) : 0;

  return (
    <div style={{ padding: '62px 20px 24px' }}>
      <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 4, fontWeight: 500 }}>Your journey</div>
      <div style={{ fontSize: 28, fontWeight: 500, letterSpacing: -0.6, marginBottom: 20 }}>Progress</div>

      {/* Big weight card */}
      <SageCard style={{ marginBottom: 12, padding: '22px 20px 20px' }}>
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, marginBottom: 4 }}>
          <div style={{ fontSize: 56, fontWeight: 300, letterSpacing: -2, lineHeight: 1 }}>{weight.toFixed(1)}</div>
          <div style={{ fontSize: 16, color: sageColors.inkSoft, paddingBottom: 8 }}>kg</div>
          <div style={{ flex: 1 }} />
          <div style={{
            padding: '5px 10px',
            background: weekChange <= 0 ? sageColors.sageLight : sageColors.dangerSoft, borderRadius: 999,
            fontSize: 11, fontWeight: 500,
            color: weekChange <= 0 ? sageColors.sageDeep : sageColors.danger,
            marginBottom: 6,
          }}>{weekChange <= 0 ? '−' : '+'}{Math.abs(weekChange).toFixed(1)} kg / wk</div>
        </div>
        <div style={{ fontSize: 13, color: sageColors.inkSoft, marginBottom: 16 }}>Week {user.weekNumber} of your plan</div>
        <WeightChart history={history} stroke={sageColors.sageDeep} fill="rgba(61,188,181,0.08)" dotFill={sageColors.sageDeep} goalLine={user.goalWeight} width={320} height={140} />
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 12, fontSize: 11, color: sageColors.inkFaint }}>
          {history.filter((_, i) => i % 2 === 0).map((h, i) => <span key={i}>W{h.week}</span>)}
        </div>
      </SageCard>

      {/* Stat tiles */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 12 }}>
        <MetricTile label="Start" value={user.startWeight} unit="kg" />
        <MetricTile label="Lost" value={lostKg.toFixed(1)} unit="kg" highlight />
        <MetricTile label="To go" value={toGoalKg.toFixed(1)} unit="kg" />
      </div>

      <SageButton onClick={() => onOpen({ type: 'weight' })} style={{ marginBottom: 20 }}>Log today's weight</SageButton>

      {/* Projection */}
      <SageCard style={{ marginBottom: 12, padding: '18px 20px' }}>
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 6 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 12, background: sageColors.accentSoft,
            display: 'flex', alignItems: 'center', justifyContent: 'center', marginRight: 12,
          }}>{SageIcon.flame(sageColors.accent, 18)}</div>
          <div>
            <div style={{ fontSize: 13, color: sageColors.inkSoft }}>At your current pace</div>
            <div style={{ fontSize: 16, fontWeight: 500 }}>You'll hit {user.goalWeight} kg in ~{weeksToGoal} weeks</div>
          </div>
        </div>
      </SageCard>

      {/* BMI */}
      <SageCard style={{ marginBottom: 12, padding: '18px 20px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', fontWeight: 500 }}>BMI</div>
            <div style={{ fontSize: 24, fontWeight: 500, letterSpacing: -0.5, marginTop: 4, fontVariantNumeric: 'tabular-nums' }}>{bmi.toFixed(1)}</div>
          </div>
          <div style={{
            padding: '5px 12px', background: bmiLabel === 'Healthy' ? sageColors.sageLight : sageColors.accentSoft,
            borderRadius: 999, fontSize: 12, fontWeight: 500,
            color: bmiLabel === 'Healthy' ? sageColors.sageDeep : sageColors.accent,
          }}>{bmiLabel}</div>
        </div>
        <BmiScale bmi={bmi} />
      </SageCard>

      {/* History */}
      <SageSectionHeader>History</SageSectionHeader>
      <SageCard style={{ padding: 0, overflow: 'hidden' }}>
        {[...history].reverse().slice(0, 6).map((h, i, arr) => {
          const prev = history[history.length - 2 - i];
          const delta = prev ? h.weight - prev.weight : 0;
          return (
            <div key={h.week} style={{
              padding: '14px 18px', display: 'flex', alignItems: 'center',
              borderBottom: i < arr.length - 1 ? `1px solid ${sageColors.divider}` : 'none',
            }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 500 }}>{h.date}</div>
                <div style={{ fontSize: 11, color: sageColors.inkSoft }}>Week {h.week}</div>
              </div>
              <div style={{ fontSize: 16, fontWeight: 500, letterSpacing: -0.3, marginRight: 10, fontVariantNumeric: 'tabular-nums' }}>{h.weight.toFixed(1)} kg</div>
              {prev && <div style={{
                fontSize: 11, padding: '3px 8px', borderRadius: 999,
                background: delta <= 0 ? sageColors.sageLight : sageColors.dangerSoft,
                color: delta <= 0 ? sageColors.sageDeep : sageColors.danger, fontWeight: 500,
              }}>{delta <= 0 ? '−' : '+'}{Math.abs(delta).toFixed(1)}</div>}
            </div>
          );
        })}
      </SageCard>

      {/* Achievements */}
      <SageSectionHeader right={<span style={{ fontSize: 12, color: sageColors.sage, fontWeight: 500 }}>{achievements.filter(a => a.unlocked).length}/{achievements.length}</span>}>Milestones</SageSectionHeader>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        {achievements.map(a => (
          <div key={a.id} style={{
            background: a.unlocked ? sageColors.surface : 'transparent',
            border: a.unlocked ? 'none' : `1.5px dashed ${sageColors.divider}`,
            borderRadius: 18, padding: '14px 14px', opacity: a.unlocked ? 1 : 0.55,
          }}>
            <div style={{
              width: 36, height: 36, borderRadius: 10,
              background: a.unlocked ? sageColors.accentSoft : sageColors.bg,
              display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 8,
            }}>
              {SageIcon[a.icon]?.(a.unlocked ? sageColors.accent : sageColors.inkFaint, 18)}
            </div>
            <div style={{ fontSize: 13, fontWeight: 500, color: sageColors.ink, lineHeight: 1.2 }}>{a.title}</div>
            <div style={{ fontSize: 11, color: sageColors.inkSoft, marginTop: 4, lineHeight: 1.3 }}>{a.desc}</div>
            {a.unlocked && a.date && <div style={{ fontSize: 10, color: sageColors.sage, marginTop: 6, fontWeight: 500 }}>Unlocked {a.date}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function MetricTile({ label, value, unit, highlight }) {
  return (
    <div style={{
      background: highlight ? sageColors.sage : sageColors.surface,
      color: highlight ? '#fff' : sageColors.ink,
      borderRadius: 18, padding: '14px 14px 16px',
    }}>
      <div style={{ fontSize: 11, opacity: highlight ? 0.7 : 0.6, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 6, fontWeight: 500 }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
        <div style={{ fontSize: 22, fontWeight: 500, letterSpacing: -0.5, fontVariantNumeric: 'tabular-nums' }}>{value}</div>
        <div style={{ fontSize: 11, opacity: highlight ? 0.7 : 0.5 }}>{unit}</div>
      </div>
    </div>
  );
}

function BmiScale({ bmi }) {
  const min = 15, max = 40;
  const pct = Math.max(0, Math.min(100, ((bmi - min) / (max - min)) * 100));
  return (
    <div>
      <div style={{ position: 'relative', height: 10, borderRadius: 6, overflow: 'hidden', display: 'flex' }}>
        <div style={{ flex: (18.5 - min) / (max - min), background: '#B3C4D1' }} />
        <div style={{ flex: (25 - 18.5) / (max - min), background: sageColors.sageMid }} />
        <div style={{ flex: (30 - 25) / (max - min), background: sageColors.accent }} />
        <div style={{ flex: (max - 30) / (max - min), background: sageColors.danger }} />
        <div style={{
          position: 'absolute', left: `calc(${pct}% - 5px)`, top: -3, width: 10, height: 16,
          background: '#fff', border: `2px solid ${sageColors.ink}`, borderRadius: 5,
        }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: sageColors.inkFaint, marginTop: 6 }}>
        <span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span>
      </div>
    </div>
  );
}

Object.assign(window, { SageProgress });

</script>
<script type="text/babel" data-file="components/sage/food-search.jsx">
// Food search overlay (Yazio-style database search) + photo + barcode + custom

function SageFoodSearch({ state, meal, onClose }) {
  const [mode, setMode] = React.useState('search'); // search | photo | barcode | custom | analyzing | confirm
  const [query, setQuery] = React.useState('');
  const [selectedFood, setSelectedFood] = React.useState(null);
  const [desc, setDesc] = React.useState('');
  const [analyzed, setAnalyzed] = React.useState(null);

  const results = query.trim()
    ? state.foodDatabase.filter(f => f.name.toLowerCase().includes(query.toLowerCase()) || f.brand.toLowerCase().includes(query.toLowerCase()))
    : state.foodDatabase.slice(0, 8);

  const pickFood = (f) => setSelectedFood({ ...f, quantity: 1, meal });

  const saveSelected = () => {
    const f = selectedFood;
    state.addFood({
      name: f.name, meal: f.meal || meal,
      kcal: Math.round(f.kcal * f.quantity),
      protein: Math.round(f.protein * f.quantity),
      carbs: Math.round(f.carbs * f.quantity),
      fat: Math.round(f.fat * f.quantity),
      fiber: Math.round((f.fiber || 0) * f.quantity),
      serving: `${f.quantity}× ${f.serving}`,
      hasPhoto: false,
    });
    onClose();
  };

  // Photo mode
  const takePhoto = () => {
    setMode('analyzing');
    setTimeout(() => {
      setAnalyzed({ name: 'Salmon bowl with quinoa', kcal: 520, protein: 34, carbs: 42, fat: 18, fiber: 6, meal, serving: '1 bowl', hasPhoto: true });
      setMode('confirm');
    }, 1500);
  };

  const submitDesc = async () => {
    if (!desc.trim()) return;
    setMode('analyzing');
    const result = await analyzeFoodDescription(desc);
    setAnalyzed({ ...result, meal, hasPhoto: false });
    setMode('confirm');
  };

  const saveAnalyzed = () => {
    state.addFood(analyzed);
    onClose();
  };

  // Header changes by mode
  if (selectedFood) return <FoodDetail food={selectedFood} onChange={setSelectedFood} onBack={() => setSelectedFood(null)} onSave={saveSelected} onClose={onClose} />;

  return (
    <SageFullScreen onClose={onClose} title={`Add to ${meal.toLowerCase()}`}>
      <div style={{ padding: '0 16px 20px' }}>
        {/* Mode tabs */}
        <div style={{ display: 'flex', gap: 6, background: sageColors.surface, borderRadius: 14, padding: 4, marginBottom: 14 }}>
          {[
            { k: 'search', label: 'Search', icon: SageIcon.search },
            { k: 'barcode', label: 'Scan', icon: SageIcon.barcode },
            { k: 'photo', label: 'Photo', icon: SageIcon.camera },
            { k: 'custom', label: 'Describe', icon: null },
          ].map(t => (
            <button key={t.k} onClick={() => setMode(t.k)} style={{
              flex: 1, background: mode === t.k ? sageColors.sage : 'transparent', color: mode === t.k ? '#fff' : sageColors.inkSoft,
              border: 'none', borderRadius: 10, padding: '10px 4px', fontSize: 12, fontWeight: 500, cursor: 'pointer',
              fontFamily: 'inherit', transition: 'all 0.15s',
            }}>{t.label}</button>
          ))}
        </div>

        {mode === 'search' && (
          <>
            <div style={{
              background: sageColors.surface, borderRadius: 16, padding: '12px 16px',
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12,
            }}>
              {SageIcon.search(sageColors.inkFaint)}
              <input value={query} onChange={e => setQuery(e.target.value)} autoFocus placeholder="Search foods, brands…"
                style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 15, color: sageColors.ink, fontFamily: 'inherit' }}/>
              {query && <button onClick={() => setQuery('')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>{SageIcon.close(sageColors.inkFaint)}</button>}
            </div>
            <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 8, paddingLeft: 4, fontWeight: 500 }}>
              {query ? `${results.length} results` : 'Popular foods'}
            </div>
            <div style={{ background: sageColors.surface, borderRadius: 20, overflow: 'hidden' }}>
              {results.map((f, i) => (
                <button key={f.id} onClick={() => pickFood(f)} style={{
                  width: '100%', padding: '13px 16px', display: 'flex', alignItems: 'center', gap: 12,
                  background: 'transparent', border: 'none', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
                  borderBottom: i < results.length - 1 ? `1px solid ${sageColors.divider}` : 'none',
                }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 500, color: sageColors.ink, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</div>
                    <div style={{ fontSize: 11, color: sageColors.inkSoft, marginTop: 2 }}>{f.brand} · {f.serving}</div>
                  </div>
                  <div style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>
                    <div style={{ fontSize: 15, fontWeight: 500, letterSpacing: -0.3 }}>{f.kcal}</div>
                    <div style={{ fontSize: 10, color: sageColors.inkFaint }}>kcal</div>
                  </div>
                  {SageIcon.chevron(sageColors.inkFaint)}
                </button>
              ))}
              {results.length === 0 && (
                <div style={{ padding: '32px 20px', textAlign: 'center', color: sageColors.inkSoft, fontSize: 13 }}>
                  No matches. Try "Describe" to log something custom.
                </div>
              )}
            </div>
          </>
        )}

        {mode === 'barcode' && (
          <div style={{ marginTop: 20, textAlign: 'center' }}>
            <div style={{
              aspectRatio: '1/1', maxWidth: 280, margin: '0 auto 20px',
              background: sageColors.surface, borderRadius: 24, padding: 20,
              display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative',
            }}>
              <div style={{
                position: 'absolute', inset: 20, border: `2px dashed ${sageColors.sageLight}`, borderRadius: 16,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <div style={{ textAlign: 'center', color: sageColors.inkSoft }}>
                  {SageIcon.barcode(sageColors.sageDeep, 48)}
                  <div style={{ fontSize: 13, marginTop: 12 }}>Point at a barcode</div>
                  <div style={{ fontSize: 11, marginTop: 4, color: sageColors.inkFaint }}>Camera preview</div>
                </div>
              </div>
              <div style={{
                position: 'absolute', left: '15%', right: '15%', top: '50%', height: 2,
                background: sageColors.sage, opacity: 0.5,
                animation: 'scanLine 2s ease-in-out infinite',
              }} />
            </div>
            <SageButton onClick={() => { setQuery('greek'); setMode('search'); }} style={{ marginBottom: 8 }}>Simulate scan</SageButton>
            <div style={{ fontSize: 12, color: sageColors.inkSoft, lineHeight: 1.5, maxWidth: 260, margin: '0 auto' }}>
              Hold your camera steady — we'll match it to the database.
            </div>
            <style>{`@keyframes scanLine { 0%, 100% { top: 20%; } 50% { top: 80%; } }`}</style>
          </div>
        )}

        {mode === 'photo' && (
          <div style={{ marginTop: 8 }}>
            <div style={{
              background: sageColors.surface, borderRadius: 24, padding: 20, textAlign: 'center',
            }}>
              <div style={{
                aspectRatio: '1/1', maxWidth: 220, margin: '0 auto 16px',
                borderRadius: 20,
                background: 'repeating-linear-gradient(135deg, rgba(61,188,181,0.14), rgba(61,188,181,0.14) 8px, rgba(61,188,181,0.06) 8px, rgba(61,188,181,0.06) 16px)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <div style={{ color: sageColors.sageDeep, textAlign: 'center' }}>
                  {SageIcon.camera(sageColors.sageDeep, 36)}
                  <div style={{ fontSize: 11, marginTop: 8, fontFamily: 'ui-monospace, monospace', color: 'rgba(61,188,181,0.5)' }}>your plate</div>
                </div>
              </div>
              <SageButton onClick={takePhoto}>Snap a photo</SageButton>
              <div style={{ fontSize: 12, color: sageColors.inkSoft, marginTop: 12, lineHeight: 1.5 }}>
                AI estimates calories, macros<br/>and suggests a name.
              </div>
            </div>
          </div>
        )}

        {mode === 'custom' && (
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 13, color: sageColors.inkSoft, marginBottom: 10, paddingLeft: 4 }}>
              Tell Coach what you had — "two eggs, avocado toast, black coffee" — and we'll do the math.
            </div>
            <textarea value={desc} onChange={e => setDesc(e.target.value)} autoFocus placeholder="e.g. Salmon, rice, salad with olive oil"
              style={{
                width: '100%', minHeight: 110, background: sageColors.surface, border: 'none',
                borderRadius: 20, padding: 18, fontSize: 15, lineHeight: 1.4, color: sageColors.ink,
                fontFamily: 'inherit', resize: 'none', outline: 'none', marginBottom: 12, boxSizing: 'border-box',
              }}/>
            <SageButton onClick={submitDesc} disabled={!desc.trim()}>Estimate with Coach</SageButton>
          </div>
        )}

        {mode === 'analyzing' && (
          <div style={{ padding: '60px 20px', textAlign: 'center' }}>
            <div style={{
              width: 60, height: 60, borderRadius: 30, border: `3px solid ${sageColors.sageLight}`,
              borderTopColor: sageColors.sageDeep, margin: '0 auto 20px',
              animation: 'spin 0.8s linear infinite',
            }} />
            <div style={{ fontSize: 15, color: sageColors.inkSoft }}>Reading your plate…</div>
          </div>
        )}

        {mode === 'confirm' && analyzed && (
          <div style={{ marginTop: 8 }}>
            <SageCard>
              <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 4 }}>{analyzed.meal}</div>
              <div style={{ fontSize: 18, fontWeight: 500, letterSpacing: -0.3, marginBottom: 16 }}>{analyzed.name}</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <MacroTile label="Calories" value={analyzed.kcal} unit="" color={sageColors.ink} bg={sageColors.sageLight} />
                <MacroTile label="Protein" value={analyzed.protein} unit="g" color={sageColors.ink} bg={sageColors.sageLight} />
                <MacroTile label="Carbs" value={analyzed.carbs} unit="g" color={sageColors.ink} bg={sageColors.sageLight} />
                <MacroTile label="Fat" value={analyzed.fat} unit="g" color={sageColors.ink} bg={sageColors.sageLight} />
              </div>
            </SageCard>
            <div style={{ marginTop: 12 }}>
              <SageButton onClick={saveAnalyzed} style={{ marginBottom: 8 }}>Save to {analyzed.meal.toLowerCase()}</SageButton>
              <SageButton variant="ghost" onClick={() => setMode('custom')}>Not quite right — edit</SageButton>
            </div>
          </div>
        )}
      </div>
    </SageFullScreen>
  );
}

function MacroTile({ label, value, unit, color, bg }) {
  return (
    <div style={{ background: bg, borderRadius: 14, padding: '12px 14px' }}>
      <div style={{ fontSize: 11, color: sageColors.inkSoft, marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 500, letterSpacing: -0.4, color, fontVariantNumeric: 'tabular-nums' }}>
        {value}<span style={{ fontSize: 12, color: sageColors.inkSoft, fontWeight: 400 }}>{unit}</span>
      </div>
    </div>
  );
}

function FoodDetail({ food, onChange, onBack, onSave, onClose }) {
  const setQty = (n) => onChange({ ...food, quantity: Math.max(0.25, Math.round(n * 4) / 4) });
  const q = food.quantity;
  return (
    <SageFullScreen onClose={onBack} title={food.name}>
      <div style={{ padding: '0 16px 20px' }}>
        <SageCard style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 4 }}>{food.brand}</div>
          <div style={{ fontSize: 18, fontWeight: 500, letterSpacing: -0.3, marginBottom: 16 }}>{food.name}</div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 18 }}>
            <button onClick={() => setQty(q - 0.25)} style={{
              width: 40, height: 40, borderRadius: 20, background: sageColors.bg, border: 'none',
              fontSize: 22, cursor: 'pointer', color: sageColors.ink, fontFamily: 'inherit',
            }}>−</button>
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ fontSize: 28, fontWeight: 500, letterSpacing: -0.8, fontVariantNumeric: 'tabular-nums' }}>{q}×</div>
              <div style={{ fontSize: 12, color: sageColors.inkSoft, marginTop: 2 }}>{food.serving}</div>
            </div>
            <button onClick={() => setQty(q + 0.25)} style={{
              width: 40, height: 40, borderRadius: 20, background: sageColors.sage, border: 'none',
              fontSize: 22, cursor: 'pointer', color: '#fff', fontFamily: 'inherit',
            }}>+</button>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <MacroTile label="Calories" value={Math.round(food.kcal * q)} unit="" color={sageColors.ink} bg={sageColors.sageLight} />
            <MacroTile label="Protein" value={Math.round(food.protein * q)} unit="g" color={sageColors.ink} bg={sageColors.sageLight} />
            <MacroTile label="Carbs" value={Math.round(food.carbs * q)} unit="g" color={sageColors.ink} bg={sageColors.sageLight} />
            <MacroTile label="Fat" value={Math.round(food.fat * q)} unit="g" color={sageColors.ink} bg={sageColors.sageLight} />
          </div>
        </SageCard>

        <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', margin: '16px 4px 8px', fontWeight: 500 }}>Which meal</div>
        <SageCard style={{ padding: 0, overflow: 'hidden', marginBottom: 18 }}>
          {['Breakfast', 'Lunch', 'Dinner', 'Snack'].map((m, i) => (
            <button key={m} onClick={() => onChange({ ...food, meal: m })} style={{
              width: '100%', padding: '14px 16px', background: (food.meal || '') === m ? sageColors.sageLight : 'transparent',
              border: 'none', textAlign: 'left', cursor: 'pointer', fontFamily: 'inherit',
              fontSize: 14, fontWeight: 500, color: sageColors.ink,
              borderBottom: i < 3 ? `1px solid ${sageColors.divider}` : 'none',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            }}>
              {m}
              {(food.meal || '') === m && <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8l3 3 7-7" stroke={sageColors.sageDeep} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </button>
          ))}
        </SageCard>

        <SageButton onClick={onSave}>Add to diary</SageButton>
      </div>
    </SageFullScreen>
  );
}

// Weight log sheet
function SageLogWeight({ state, onClose }) {
  const [val, setVal] = React.useState(state.weight.toFixed(1));
  const save = () => {
    const n = parseFloat(val);
    if (!isNaN(n) && n > 30 && n < 250) { state.logWeight(n); onClose(); }
  };
  return (
    <SageSheet onClose={onClose} title="Log weight">
      <div style={{ fontSize: 13, color: sageColors.inkSoft, marginBottom: 14 }}>Morning, after the bathroom, before eating.</div>
      <div style={{
        background: sageColors.surface, borderRadius: 20, padding: '28px 20px',
        display: 'flex', alignItems: 'baseline', justifyContent: 'center', gap: 8, marginBottom: 16,
      }}>
        <input type="number" step="0.1" value={val} onChange={e => setVal(e.target.value)} style={{
          fontSize: 56, fontWeight: 300, letterSpacing: -2, color: sageColors.ink,
          border: 'none', outline: 'none', background: 'transparent',
          width: 160, textAlign: 'right', fontFamily: 'inherit',
        }} />
        <div style={{ fontSize: 18, color: sageColors.inkSoft }}>kg</div>
      </div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
        {[-0.5, -0.1, +0.1, +0.5].map(d => (
          <button key={d} onClick={() => setVal((parseFloat(val) + d).toFixed(1))} style={{
            flex: 1, background: sageColors.surface, border: 'none', borderRadius: 14,
            padding: '12px 0', fontSize: 14, fontWeight: 500, color: sageColors.ink,
            cursor: 'pointer', fontFamily: 'inherit',
          }}>{d > 0 ? '+' : ''}{d}</button>
        ))}
      </div>
      <SageButton onClick={save}>Save weight</SageButton>
    </SageSheet>
  );
}

</script>

                {item.name}{item.dose ? ` · ${item.dose}` : ''}
              </div>
              <div style={{ fontSize: 12, color: sageColors.inkSoft, marginTop: 2 }}>
                {item.qty} × {item.form}{item.note ? ` · ${item.note}` : ''}
              </div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 20, paddingTop: 14, borderTop: `1px solid ${sageColors.divider}` }}>
            <div><div style={{ fontSize: 10, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 3 }}>Order</div><div style={{ fontSize: 13, fontWeight: 500, fontVariantNumeric: 'tabular-nums' }}>#{order.orderNumber.slice(-7)}</div></div>
            <div><div style={{ fontSize: 10, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 3 }}>Placed</div><div style={{ fontSize: 13, fontWeight: 500 }}>{order.placedDate}</div></div>
            {order.totalBRL > 0 && <div><div style={{ fontSize: 10, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 3 }}>Total</div><div style={{ fontSize: 13, fontWeight: 500 }}>R$ {order.totalBRL.toFixed(2).replace('.', ',')}</div></div>}
          </div>
        </SageCard>

        {/* Timeline */}
        <SageSectionHeader>{isDelivered ? 'Journey' : 'Tracking'}</SageSectionHeader>
        <SageCard style={{ padding: '18px 20px' }}>
          {order.timeline.map((t, i) => {
            const isLast = i === order.timeline.length - 1;
            return (
              <div key={i} style={{ display: 'flex', gap: 14, paddingBottom: isLast ? 0 : 18, position: 'relative' }}>
                {/* Line */}
                {!isLast && (
                  <div style={{
                    position: 'absolute', left: 11, top: 24, bottom: -6, width: 2,
                    background: t.done ? sageColors.sage : sageColors.divider,
                  }} />
                )}
                {/* Dot */}
                <div style={{
                  width: 24, height: 24, borderRadius: 12, flexShrink: 0,
                  background: t.done ? sageColors.sage : sageColors.surface,
                  border: t.done ? 'none' : `2px solid ${sageColors.divider}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  boxShadow: t.active ? `0 0 0 6px ${sageColors.sageLight}` : 'none',
                }}>
                  {t.done && !t.active && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" stroke="#fff" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  {t.active && <div style={{ width: 8, height: 8, borderRadius: 4, background: '#fff' }} />}
                </div>
                <div style={{ flex: 1, paddingTop: 2 }}>
                  <div style={{ fontSize: 14, fontWeight: 500, color: t.done ? sageColors.ink : sageColors.inkSoft }}>{t.label}</div>
                  {t.at && <div style={{ fontSize: 11, color: sageColors.inkSoft, marginTop: 2 }}>{t.at}</div>}
                  {t.note && <div style={{ fontSize: 12, color: t.active ? sageColors.sageDeep : sageColors.inkSoft, marginTop: 4, fontStyle: t.active ? 'italic' : 'normal' }}>{t.note}</div>}
                </div>
              </div>
            );
          })}
        </SageCard>

        {/* Pharmacy */}
        <SageSectionHeader>Pharmacy</SageSectionHeader>
        <SageCard style={{ padding: '16px 18px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{
              width: 40, height: 40, borderRadius: 12, background: sageColors.sageLight,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>{SageIcon.pill(sageColors.sageDeep, 18)}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 500 }}>{order.pharmacy}</div>
              {order.pharmacist && <div style={{ fontSize: 12, color: sageColors.inkSoft, marginTop: 2 }}>Dispensed by {order.pharmacist}</div>}
            </div>
          </div>
        </SageCard>

        {/* Shipping */}
        <SageSectionHeader>Shipping</SageSectionHeader>
        <SageCard style={{ padding: 0, overflow: 'hidden' }}>
          <DetailRow label="Carrier" value={order.carrier} />
          <DetailRow label="Tracking code" value={order.trackingCode} mono />
          <DetailRow label="Address" value={order.address} last />
        </SageCard>

        {!isDelivered && (
          <div style={{ marginTop: 20 }}>
            <SageButton variant="secondary" onClick={() => {}}>Need to change address?</SageButton>
          </div>
        )}
      </div>
    </SageFullScreen>
  );
}

function DetailRow({ label, value, mono, last }) {
  return (
    <div style={{
      padding: '12px 16px',
      borderBottom: last ? 'none' : `1px solid ${sageColors.divider}`,
      display: 'flex', alignItems: 'center', gap: 12,
    }}>
      <div style={{ fontSize: 12, color: sageColors.inkSoft, flexShrink: 0, width: 100 }}>{label}</div>
      <div style={{
        flex: 1, fontSize: 13, color: sageColors.ink, fontWeight: 500, textAlign: 'right',
        fontFamily: mono ? 'ui-monospace, SFMono-Regular, monospace' : 'inherit',
        letterSpacing: mono ? 0.2 : 0,
      }}>{value}</div>
    </div>
  );
}

// ────────────────── Consultation detail ──────────────────
function SageConsultDetail({ consult, onClose, startCall, onJoinCall }) {
  if (startCall) return <SageVideoCall consult={consult} onEnd={onClose} />;
  const isUpcoming = consult.status === 'upcoming';

  return (
    <SageFullScreen onClose={onClose} title={isUpcoming ? 'Upcoming consultation' : 'Consultation recap'}>
      <div style={{ padding: '0 16px 40px' }}>
        {/* Doctor hero */}
        <SageCard style={{ padding: '20px', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{
            width: 56, height: 56, borderRadius: 28, background: sageColors.accent,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontWeight: 500, fontSize: 18,
          }}>{consult.doctor.avatarInitial}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 500, letterSpacing: -0.2 }}>{consult.doctor.name}</div>
            <div style={{ fontSize: 13, color: sageColors.inkSoft, marginTop: 2 }}>{consult.doctor.title}</div>
            <div style={{ fontSize: 11, color: sageColors.inkFaint, marginTop: 3, fontFamily: 'ui-monospace, monospace' }}>{consult.doctor.crm}</div>
          </div>
        </SageCard>

        {/* When */}
        <SageCard style={{ padding: 0, overflow: 'hidden', marginBottom: 12 }}>
          <DetailRow label="Type" value={consult.type} />
          <DetailRow label="Date" value={consult.date} />
          <DetailRow label="Time" value={consult.time} />
          <DetailRow label="Duration" value={consult.duration} last />
        </SageCard>

        {isUpcoming && (
          <>
            <SageSectionHeader>Agenda</SageSectionHeader>
            <SageCard style={{ padding: '8px 16px 14px' }}>
              {consult.agenda.map((a, i) => (
                <div key={i} style={{ display: 'flex', gap: 12, padding: '10px 0', borderBottom: i < consult.agenda.length - 1 ? `1px solid ${sageColors.divider}` : 'none' }}>
                  <div style={{ width: 6, height: 6, borderRadius: 3, background: sageColors.sage, marginTop: 8, flexShrink: 0 }}/>
                  <div style={{ fontSize: 14, lineHeight: 1.4 }}>{a}</div>
                </div>
              ))}
            </SageCard>

            <div style={{ marginTop: 20 }}>
              <SageButton onClick={onJoinCall}>Join video call</SageButton>
              <div style={{ textAlign: 'center', fontSize: 12, color: sageColors.inkFaint, marginTop: 10 }}>
                Tap to preview the call · this is a demo
              </div>
            </div>
          </>
        )}

        {!isUpcoming && (
          <>
            <SageSectionHeader>Doctor's summary</SageSectionHeader>
            <SageCard style={{ padding: '16px 18px' }}>
              <div style={{ fontFamily: '"Fraunces", serif', fontSize: 15, lineHeight: 1.5, color: sageColors.ink, fontStyle: 'italic' }}>
                "{consult.summary}"
              </div>
            </SageCard>

            {consult.notes && (
              <>
                <SageSectionHeader>Notes</SageSectionHeader>
                <SageCard style={{ padding: '8px 18px' }}>
                  {consult.notes.map((n, i) => (
                    <div key={i} style={{ display: 'flex', gap: 12, padding: '10px 0', borderBottom: i < consult.notes.length - 1 ? `1px solid ${sageColors.divider}` : 'none' }}>
                      <div style={{ width: 6, height: 6, borderRadius: 3, background: sageColors.sageMid, marginTop: 7, flexShrink: 0 }}/>
                      <div style={{ fontSize: 13, lineHeight: 1.4, color: sageColors.ink }}>{n}</div>
                    </div>
                  ))}
                </SageCard>
              </>
            )}

            {consult.prescribed && (
              <>
                <SageSectionHeader>Prescribed</SageSectionHeader>
                {consult.prescribed.map((p, i) => (
                  <SageCard key={i} style={{ padding: '14px 18px', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: sageColors.sageLight, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {SageIcon.pill(sageColors.sageDeep, 16)}
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 500, flex: 1 }}>{p}</div>
                  </SageCard>
                ))}
              </>
            )}

            {consult.nextReview && (
              <>
                <SageSectionHeader>Next review</SageSectionHeader>
                <SageCard style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: sageColors.accentSoft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    {SageIcon.bell(sageColors.accent, 16)}
                  </div>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{consult.nextReview}</div>
                </SageCard>
              </>
            )}
          </>
        )}
      </div>
    </SageFullScreen>
  );
}

// ────────────────── Video call (demo) ──────────────────
function SageVideoCall({ consult, onEnd }) {
  const [seconds, setSeconds] = React.useState(0);
  const [muted, setMuted] = React.useState(false);
  const [videoOff, setVideoOff] = React.useState(false);
  React.useEffect(() => {
    const t = setInterval(() => setSeconds(s => s + 1), 1000);
    return () => clearInterval(t);
  }, []);
  const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
  const ss = String(seconds % 60).padStart(2, '0');

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 200, background: '#0a0f0c',
      display: 'flex', flexDirection: 'column', color: '#fff',
      animation: 'fadeIn 0.3s ease',
    }}>
      {/* Doctor video (placeholder) */}
      <div style={{
        flex: 1, position: 'relative',
        background: `linear-gradient(135deg, ${sageColors.sageDeep}, #0a2016)`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{
          width: 140, height: 140, borderRadius: 70, background: sageColors.accent,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 54, fontWeight: 500,
        }}>{consult.doctor.avatarInitial}</div>

        {/* Top bar */}
        <div style={{
          position: 'absolute', top: 56, left: 16, right: 16,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 500 }}>{consult.doctor.name}</div>
            <div style={{ fontSize: 12, opacity: 0.7 }}>{consult.type}</div>
          </div>
          <div style={{
            padding: '6px 12px', background: 'rgba(255,255,255,0.15)', borderRadius: 999,
            fontSize: 12, fontVariantNumeric: 'tabular-nums', display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <div style={{ width: 6, height: 6, borderRadius: 3, background: '#ff5a5a' }}/>
            <span>{mm}:{ss}</span>
          </div>
        </div>

        {/* Self-view (PiP) */}
        <div style={{
          position: 'absolute', right: 16, bottom: 24, width: 96, height: 128, borderRadius: 16,
          background: videoOff ? '#1a2a20' : 'repeating-linear-gradient(135deg, #243530, #243530 4px, #1a2a20 4px, #1a2a20 8px)',
          border: '2px solid rgba(255,255,255,0.2)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {videoOff
            ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M2 4l20 16M8 6h8a2 2 0 012 2v7M6 8v9a2 2 0 002 2h8l-4-4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/></svg>
            : <div style={{ fontSize: 28, opacity: 0.8, fontWeight: 500 }}>M</div>}
        </div>
      </div>

      {/* Controls */}
      <div style={{
        padding: '24px 16px 44px', background: '#0a0f0c',
        display: 'flex', justifyContent: 'center', gap: 16,
      }}>
        <CallButton active={!muted} onClick={() => setMuted(m => !m)}>
          {muted
            ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M2 4l20 16M9 9v3a3 3 0 005 2.2M15 9V6a3 3 0 00-6 0v1M19 12a7 7 0 01-.6 2.8M12 19v3M8 22h8" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/></svg>
            : <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="13" rx="3" stroke="#fff" strokeWidth="1.5"/><path d="M5 12a7 7 0 0014 0M12 19v3M8 22h8" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/></svg>}
        </CallButton>
        <CallButton active={!videoOff} onClick={() => setVideoOff(v => !v)}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="14" height="12" rx="2" stroke="#fff" strokeWidth="1.5"/><path d="M16 10l6-3v10l-6-3" stroke="#fff" strokeWidth="1.5" strokeLinejoin="round"/></svg>
        </CallButton>
        <CallButton danger onClick={onEnd}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M2 12c5-5 15-5 20 0l-3 3-3-2v-3c-2-1-6-1-8 0v3l-3 2-3-3z" fill="#fff"/></svg>
        </CallButton>
      </div>
    </div>
  );
}

function CallButton({ children, active = true, danger, onClick }) {
  return (
    <button onClick={onClick} style={{
      width: 58, height: 58, borderRadius: 29, border: 'none', cursor: 'pointer',
      background: danger ? '#E54B4B' : (active ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.5)'),
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      transform: danger ? 'rotate(135deg)' : 'none',
    }}>{children}</button>
  );
}

// ────────────────── Prescription PDF view ──────────────────
function SagePrescriptionDetail({ rx, onClose }) {
  const active = rx.status === 'active';
  return (
    <SageFullScreen onClose={onClose} title="Prescription" rightAction={
      <button style={{
        padding: '8px 14px', background: sageColors.sage, border: 'none', borderRadius: 14,
        color: '#fff', fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
      }}>Download PDF</button>
    }>
      <div style={{ padding: '0 16px 40px' }}>
        {/* Paper sheet */}
        <div style={{
          background: '#fff', borderRadius: 16, padding: '28px 24px',
          boxShadow: '0 2px 20px rgba(0,0,0,0.12)', position: 'relative',
          fontFamily: '"Fraunces", serif',
        }}>
          {/* Letterhead */}
          <div style={{ textAlign: 'center', marginBottom: 22, paddingBottom: 16, borderBottom: '1px solid rgba(0,0,0,0.10)' }}>
            <div style={{ fontSize: 20, letterSpacing: 2, color: sageColors.sageDeep, fontWeight: 500 }}>VYTAL</div>
            <div style={{ fontSize: 10, letterSpacing: 1, color: 'rgba(0,0,0,0.5)', textTransform: 'uppercase', marginTop: 4, fontFamily: 'Inter' }}>Medical prescription · Rx</div>
          </div>

          {/* Doctor */}
          <div style={{ marginBottom: 18, fontFamily: 'Inter' }}>
            <div style={{ fontSize: 10, color: 'rgba(0,0,0,0.5)', letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 3, fontWeight: 500 }}>Prescribing physician</div>
            <div style={{ fontSize: 14, fontWeight: 500, color: '#111' }}>{rx.issuedBy}</div>
            <div style={{ fontSize: 11, color: 'rgba(0,0,0,0.5)', marginTop: 2, fontFamily: 'ui-monospace, monospace' }}>{rx.crm}</div>
          </div>

          {/* Patient */}
          <div style={{ marginBottom: 22, paddingBottom: 18, borderBottom: '1px dashed rgba(0,0,0,0.12)', fontFamily: 'Inter' }}>
            <div style={{ fontSize: 10, color: 'rgba(0,0,0,0.5)', letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 3, fontWeight: 500 }}>Patient</div>
            <div style={{ fontSize: 14, fontWeight: 500, color: '#111' }}>Maya Rocha</div>
          </div>

          {/* Rx body */}
          <div style={{ fontFamily: 'Inter' }}>
            <div style={{ fontSize: 28, fontFamily: '"Fraunces", serif', color: sageColors.sageDeep, marginBottom: 4 }}>℞</div>
            <div style={{ fontSize: 18, fontWeight: 500, letterSpacing: -0.3, color: '#111', marginBottom: 2 }}>{rx.medication}</div>
            <div style={{ fontSize: 15, color: '#111', marginBottom: 14 }}>{rx.dose}</div>

            <div style={{ fontSize: 13, lineHeight: 1.7, color: '#111' }}>
              <div><span style={{ color: 'rgba(0,0,0,0.5)' }}>Sig:</span> {rx.frequency}</div>
              <div><span style={{ color: 'rgba(0,0,0,0.5)' }}>Duration:</span> {rx.duration}</div>
              <div><span style={{ color: 'rgba(0,0,0,0.5)' }}>Dispense:</span> {rx.quantity}</div>
            </div>
          </div>

          {/* Status stamp */}
          <div style={{
            marginTop: 24, paddingTop: 16, borderTop: '1px solid rgba(0,0,0,0.10)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontFamily: 'Inter',
          }}>
            <div style={{ fontSize: 11, color: 'rgba(0,0,0,0.5)' }}>Issued {rx.date}</div>
            <div style={{
              padding: '4px 10px', borderRadius: 999, fontSize: 11, fontWeight: 500,
              background: active ? sageColors.sageLight : sageColors.bgSoft,
              color: active ? sageColors.sageDeep : sageColors.inkSoft,
              border: `1.5px solid ${active ? sageColors.sage : sageColors.divider}`,
            }}>{active ? 'Active' : 'Superseded'}</div>
          </div>
        </div>

        <div style={{ marginTop: 20 }}>
          <SageButton variant="secondary" onClick={() => {}}>Send to pharmacy</SageButton>
        </div>
        <div style={{ fontSize: 11, color: sageColors.inkFaint, textAlign: 'center', marginTop: 14, lineHeight: 1.5 }}>
          You can fill this prescription at any licensed pharmacy.<br/>VYTAL pharmacy partners deliver in cold-chain within 48 h.
        </div>
      </div>
    </SageFullScreen>
  );
}

Object.assign(window, { SageOrderDetail, SageConsultDetail, SagePrescriptionDetail });

</script>
<script type="text/babel" data-file="components/sage/workouts.jsx">
// Workouts (Treinos) tab — daily plan with check-in / check-out tick system
// Plans come from AI trainer agent or human coach. User ticks exercises as they go.

function SageWorkouts({ state, onOpen }) {
  const { todayWorkout, weeklyWorkouts, workoutStats, toggleExerciseDone, startWorkout, finishWorkout } = state;

  // No active plan → onboarding state
  if (!todayWorkout) {
    return <WorkoutsEmpty onGenerate={() => onOpen({ type: 'generate-plan' })} />;
  }

  const completedCount = todayWorkout.exercises.filter(e => e.done).length;
  const totalCount = todayWorkout.exercises.length;
  const pct = totalCount === 0 ? 0 : Math.round((completedCount / totalCount) * 100);
  const isComplete = completedCount === totalCount;
  const isStarted = todayWorkout.startedAt != null;

  return (
    <div style={{ padding: '62px 20px 24px' }}>
      {/* Header */}
      <div style={{ fontSize: 11, color: sageColors.inkSoft, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 4, fontWeight: 500 }}>Treinos · Hoje</div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 18 }}>
        <div style={{ fontSize: 28, fontWeight: 500, letterSpacing: -0.6 }}>{todayWorkout.title}</div>
        <button onClick={() => onOpen({ type: 'workout-history' })} style={{
          background: sageColors.surface, border: 'none', borderRadius: 999, padding: '6px 12px',
          fontSize: 11, color: sageColors.inkSoft, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
        }}>Histórico</button>
      </div>

      {/* Hero — today's plan */}
      <TodayPlanHero
        workout={todayWorkout}
        pct={pct}
        completedCount={completedCount}
        totalCount={totalCount}
        isStarted={isStarted}
        isComplete={isComplete}
        onStart={startWorkout}
        onFinish={() => onOpen({ type: 'workout-complete' })}
      />

      {/* Week strip */}
      <SageSectionHeader>Esta semana</SageSectionHeader>
      <WeekStrip workouts={weeklyWorkouts} />

      {/* Exercises checklist */}
      <SageSectionHeader right={<span style={{ fontSize: 12, color: sageColors.inkSoft, fontVariantNumeric: 'tabular-nums' }}>{completedCount}/{totalCount}</span>}>
        Exercícios
      </SageSectionHeader>

      <SageCard style={{ padding: 0, overflow: 'hidden' }}>
        {todayWorkout.exercises.map((ex, i) => (
          <ExerciseRow
            key={ex.id}
            exercise={ex}
            isLast={i === todayWorkout.exercises.length - 1}
            onToggle={() => toggleExerciseDone(ex.id)}
            onOpen={() => onOpen({ type: 'exercise', exercise: ex })}
            disabled={!isStarted}
          />
        ))}
      </SageCard>

      {/* Stats footer */}
      <SageSectionHeader>Sua jornada</SageSectionHeader>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
        <StatTile label="Streak" value={`${workoutStats.streak}`} unit="dias" accent />
        <StatTile label="Esta sem." value={`${workoutStats.weekDone}/${workoutStats.weekTarget}`} unit="treinos" />
        <StatTile label="Calorias" value={`${workoutStats.kcalWeek}`} unit="kcal" />
      </div>

      {/* Plan source — AI / coach */}
      <PlanSourceCard source={todayWorkout.source} onOpen={() => onOpen({ type: 'generate-plan' })} />
    </div>
  );
}

// ─────────── Hero card with progress ring + CTA ───────────
function TodayPlanHero({ workout, pct, completedCount, totalCount, isStarted, isComplete, onStart, onFinish }) {
  return (
    <div style={{
      borderRadius: 28, marginBottom: 6, padding: '20px 20px 18px', position: 'relative', overflow: 'hidden',
      background: isComplete
        ? `linear-gradient(135deg, ${sageColors.gradientFrom}, ${sageColors.gradientTo})`
        : sageColors.surface,
      border: isComplete ? 'none' : `1px solid ${sageColors.divider}`,
    }}>
      {/* Decorative blobs when complete */}
      {isComplete && (
        <>
          <div style={{ position: 'absolute', right: -30, top: -30, width: 140, height: 140, borderRadius: '50%', background: 'rgba(255,255,255,0.07)' }} />
          <div style={{ position: 'absolute', right: 50, bottom: -40, width: 90, height: 90, borderRadius: '50%', background: 'rgba(212,184,114,0.22)' }} />
        </>
      )}

      <div style={{ position: 'relative', display: 'flex', gap: 16, alignItems: 'center' }}>
        {/* Ring */}
        <Ring
          pct={pct}
          size={92}
          stroke={7}
          color={isComplete ? '#fff' : sageColors.sage}
          bg={isComplete ? 'rgba(255,255,255,0.18)' : sageColors.divider}
        >
          <div style={{ fontSize: 22, fontWeight: 500, color: isComplete ? '#fff' : sageColors.ink, letterSpacing: -0.4, lineHeight: 1 }}>{pct}%</div>
          <div style={{ fontSize: 9, color: isComplete ? 'rgba(255,255,255,0.75)' : sageColors.inkSoft, letterSpacing: 0.4, marginTop: 3, textTransform: 'uppercase' }}>{completedCount}/{totalCount}</div>
        </Ring>

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
            <div style={{
              padding: '3px 8px', borderRadius: 999, fontSize: 10, fontWeight: 500, letterSpacing: 0.3,
              background: isComplete ? 'rgba(255,255,255,0.18)' : sageColors.sageLight,
              color: isComplete ? '#fff' : sageColors.sageDeep,
            }}>{workout.tag}</div>
            <div style={{ fontSize: 11, color: isComplete ? 'rgba(255,255,255,0.7)' : sageColors.inkSoft }}>{workout.duration} min · {workout.kcalEst} kcal</div>
          </div>
          <div style={{ fontSize: 17, fontWeight: 500, letterSpacing: -0.3, color: isComplete ? '#fff' : sageColors.ink, lineHeight: 1.2, marginBottom: 4 }}>
            {workout.subtitle}
          </div>
          <div style={{ fontSize: 12, color: isComplete ? 'rgba(255,255,255,0.75)' : sageColors.inkSoft, lineHeight: 1.4 }}>
            {workout.focus.join(' · ')}
          </div>
        </div>
      </div>

      {/* CTA */}
      <button
        onClick={isComplete ? onFinish : (isStarted ? null : onStart)}
        style={{
          marginTop: 16, width: '100%', border: 'none', borderRadius: 16, padding: '13px 0',
          fontSize: 14, fontWeight: 500, cursor: isStarted && !isComplete ? 'default' : 'pointer', fontFamily: 'inherit',
          background: isComplete
            ? sageColors.accent
            : (isStarted ? 'rgba(61,188,181,0.18)' : `linear-gradient(135deg, ${sageColors.gradientFrom}, ${sageColors.gradientTo})`),
          color: '#fff',
          boxShadow: isComplete || !isStarted ? '0 4px 14px rgba(61,188,181,0.25)' : 'none',
        }}>
        {isComplete ? '✓ Finalizar treino' : (isStarted ? `Em andamento · ${completedCount}/${totalCount} feito` : '▶ Iniciar sessão')}
      </button>
    </div>
  );
}

// ─────────── Week strip ───────────
function WeekStrip({ workouts }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 6,
      background: sageColors.surface, borderRadius: 20, padding: 10,
    }}>
      {workouts.map((d) => {
        const isToday = d.isToday;
        const status = d.status; // 'done' | 'partial' | 'today' | 'rest' | 'planned' | 'missed'
        const bg = status === 'done' ? sageColors.sage
          : status === 'today' ? sageColors.accent
          : status === 'partial' ? sageColors.sageLight
          : status === 'missed' ? sageColors.dangerSoft
          : 'transparent';
        const fg = status === 'done' || status === 'today' ? '#fff'
          : status === 'partial' ? sageColors.sageDeep
          : status === 'missed' ? sageColors.danger
          : sageColors.inkSoft;
        const border = status === 'planned' ? `1px dashed ${sageColors.divider}` : 'none';
        return (
          <div key={d.day} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
            <div style={{ fontSize: 10, color: isToday ? sageColors.accent : sageColors.inkSoft, fontWeight: isToday ? 600 : 500, letterSpacing: 0.3, textTransform: 'uppercase' }}>{d.day}</div>
            <div style={{
              width: 32, height: 32, borderRadius: 11, background: bg, border,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 11, fontWeight: 500, color: fg,
            }}>
              {status === 'done' ? '✓'
                : status === 'rest' ? '·'
                : status === 'missed' ? '×'
                : d.dayNum}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─────────── Exercise row with tick ───────────
function ExerciseRow({ exercise, isLast, onToggle, onOpen, disabled }) {
  const ex = exercise;
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
      borderBottom: isLast ? 'none' : `1px solid ${sageColors.divider}`,
      opacity: disabled ? 0.55 : 1,
    }}>
      {/* Check tick */}
      <button
        onClick={(e) => { e.stopPropagation(); if (!disabled) onToggle(); }}
        disabled={disabled}
        aria-label={ex.done ? 'Desmarcar' : 'Concluir'}
        style={{
          width: 28, height: 28, borderRadius: 14, flexShrink: 0,
          border: ex.done ? 'none' : `2px solid ${disabled ? sageColors.divider : sageColors.inkFaint}`,
          background: ex.done ? sageColors.sage : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: disabled ? 'default' : 'pointer', padding: 0, transition: 'all 0.18s',
          boxShadow: ex.done ? '0 2px 8px rgba(61,188,181,0.4)' : 'none',
        }}>
        {ex.done && (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2.5 7.2L5.5 10l6-6.5" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>

      {/* Body — clickable to open detail */}
      <button onClick={onOpen} style={{
        flex: 1, background: 'transparent', border: 'none', display: 'flex', alignItems: 'center', gap: 12,
        cursor: 'pointer', textAlign: 'left', padding: 0, fontFamily: 'inherit', minWidth: 0,
      }}>
        <ExercisePlaceholder size={48} icon={ex.icon} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontSize: 14, fontWeight: 500, color: sageColors.ink,
            textDecoration: ex.done ? 'line-through' : 'none',
            textDecorationColor: 'rgba(240,245,250,0.4)',
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{ex.name}</div>
          <div style={{ fontSize: 11, color: sageColors.inkSoft, marginTop: 2, fontVariantNumeric: 'tabular-nums' }}>
            {ex.meta}
          </div>
        </div>
        {SageIcon.chevron(sageColors.inkFaint)}
      </button>
    </div>
  );
}

// Exercise photo placeholder — simple striped tile with monospace label
function ExercisePlaceholder({ size = 48, icon }) {

    <div style={{
      width: size, height: size, borderRadius: 12, flexShrink: 0,

      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: 18,

}

// ─────────── Stat tile ───────────
function StatTile({ label, value, unit, accent }) {

    <div style={{
      background: accent ? sageColors.accentSoft : sageColors.surface,
      borderRadius: 16, padding: '12px 10px', textAlign: 'center',

      <div style={{ fontSize: 18, fontWeight: 500, letterSpacing: -0.3, color: accent ? sageColors.accent : sageColors.ink, fontVariantNumeric: 'tabular-nums', lineHeight: 1.05 }}>{value}</div>
      <div style={{ fontSize: 10, color: sageColors.inkFaint, marginTop: 2 }}>{unit}</div>
    </div>
  );
}

// ─────────── Plan source card (AI or human coach) ───────────
function PlanSourceCard({ source, onOpen }) {

    <button onClick={onOpen} style={{
      width: '100%', marginTop: 16, padding: '14px 16px', borderRadius: 20,

      display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
    }}>
      <div style={{
        width: 38, height: 38, borderRadius: 12, flexShrink: 0,
        background: isAI ? sageColors.sageLight : sageColors.accentSoft,

      }}>

// ─────────── Empty state — no plan yet ───────────
function WorkoutsEmpty({ onGenerate }) {

    <div style={{ padding: '62px 24px 24px', textAlign: 'center' }}>

      </div>
